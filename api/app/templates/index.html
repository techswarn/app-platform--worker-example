<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>API Worker</title>
  <style>
    body { font-family: -apple-system, Arial, sans-serif; max-width: 560px; margin: 60px auto; color: #1a1a1a; }
    button { padding: 10px 18px; font-size: 15px; cursor: pointer; }
    button:disabled { cursor: default; opacity: 0.6; }
    #bar-outer { background: #eee; border-radius: 6px; height: 14px; margin-top: 16px; overflow: hidden; }
    #bar-inner { background: #2563eb; height: 100%; width: 0%; transition: width 0.4s; }
    #status { margin-top: 12px; font-size: 14px; color: #444; }
    input { padding: 8px; font-size: 14px; margin-right: 8px; }
  </style>
</head>
<body>
  <h2>Long-Running Task Demo</h2>
  <p>Submits a job to a Celery worker (broker: Valkey). The task runs for about 11 minutes.</p>

  <input id="label" type="text" value="my-task" />
  <button id="submit">Start Task</button>

  <div id="bar-outer"><div id="bar-inner"></div></div>
  <div id="status">Idle.</div>

  <script>
    const submitBtn = document.getElementById("submit");
    const barInner = document.getElementById("bar-inner");
    const statusEl = document.getElementById("status");
    const labelInput = document.getElementById("label");
    let pollHandle = null;

    async function submitTask() {
      submitBtn.disabled = true;
      statusEl.textContent = "Submitting task...";
      barInner.style.width = "0%";

      const res = await fetch("/api/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ label: labelInput.value || "task" }),
      });
      const data = await res.json();
      statusEl.textContent = "Task queued: " + data.task_id;
      poll(data.task_id);
    }

    function poll(taskId) {
      if (pollHandle) clearInterval(pollHandle);
      pollHandle = setInterval(async () => {
        const res = await fetch(`/api/tasks/${taskId}`);
        const data = await res.json();

        if (data.state === "PROGRESS" && data.meta) {
          barInner.style.width = data.meta.percent + "%";
          statusEl.textContent = `Running: ${data.meta.current}/${data.meta.total} steps (${data.meta.percent}%)`;
        } else if (data.state === "SUCCESS") {
          barInner.style.width = "100%";
          statusEl.textContent = "Done: " + JSON.stringify(data.result);
          clearInterval(pollHandle);
          submitBtn.disabled = false;
        } else if (data.state === "FAILURE") {
          statusEl.textContent = "Failed: " + data.error;
          clearInterval(pollHandle);
          submitBtn.disabled = false;
        } else {
          statusEl.textContent = "State: " + data.state;
        }
      }, 5000);
    }

    submitBtn.addEventListener("click", submitTask);
  </script>
</body>
</html>
